<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Content Loading</title>
</head>
<body>
    <!-- Navbar -->
    <nav>
        <a href="#" onclick="loadContent('home.html')">Home</a>
        <a href="#" onclick="loadContent('about.html')">About</a>
        <a href="#" onclick="loadContent('contact.html')">Contact</a>
    </nav>

    <!-- Content Container -->
    <div id="content">
        <!-- Default Content (can be home.html or any initial content) -->
        <h1>Welcome to Our Website!</h1>
        <p>Click the links above to navigate.</p>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2024 My Website. All rights reserved.</p>
    </footer>

    <!-- JavaScript -->
    <script>
        // Function to load content dynamically
        async function loadContent(page) {
            try {
                const response = await fetch(page);  // Fetch the HTML content from the file
                if (!response.ok) throw new Error('Page load error');

                const html = await response.text();  // Get the HTML content as a string
                document.getElementById('content').innerHTML = html;  // Inject content into the container
            } catch (error) {
                console.error('Error loading content:', error.message);
                document.getElementById('content').innerHTML = '<p>Failed to load content.</p>';
            }
        }

        // Optional: Load default content on page load
        window.onload = () => loadContent('home.html');
    </script>
</body>
</html>
